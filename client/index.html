<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pneuma</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">

    <!-- ── SIDEBAR ─────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-header">
        <span class="brand" id="brand">Pneuma</span>
        <div class="search-wrap" id="searchWrap">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search…"
            autocomplete="off"
            spellcheck="false"
          >
          <button class="search-clear" id="searchClear" aria-label="Clear search"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" data-view="home" href="#">
          <span class="nav-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 21h10"/><rect width="20" height="14" x="2" y="3" rx="2"/></svg></span> Home
        </a>
        <a class="nav-item" data-view="settings" href="#">
          <span class="nav-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 17H5"/><path d="M19 7h-9"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg></span> Settings
        </a>
      </nav>

      <div class="sidebar-divider"></div>

      <!-- Search results (replaces category list when searching) -->
      <div class="search-results hidden" id="searchResults">
        <div class="search-section" id="searchLocal">
          <!-- populated by JS -->
        </div>
        <div class="search-divider hidden" id="searchDivider"></div>
        <div class="search-section" id="searchYoutube">
          <!-- populated by JS -->
        </div>
        <div class="search-detected hidden" id="searchDetected">
          <!-- populated by JS when URL/channel name detected -->
        </div>
      </div>

      <!-- Categories section header -->
      <div class="sidebar-cats-row">
        <button class="nav-item cats-nav-btn" data-view="categories" id="btnCategoriesPage">
          <span class="nav-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h.01"/><path d="M3 12h.01"/><path d="M3 19h.01"/><path d="M8 5h13"/><path d="M8 12h13"/><path d="M8 19h13"/></svg></span> Categories
          <button class="btn-cat-toggle" id="btnToggleCategories" title="Expand/collapse all categories"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
        </button>
      </div>

      <!-- Category + channel tree -->
      <div class="category-tree" id="categoryTree">
        <!-- populated by JS -->
      </div>

      <div class="sidebar-footer">
        <button class="btn-add-channel" id="btnAddChannel"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg> Add Channel</button>
      </div>

    </aside>

    <!-- ── MAIN CONTENT ──────────────────────────────────── -->
    <main class="main" id="main">

      <!-- Channel info header (channel pages only) — three separate top-level
           blocks (not one wrapper) so channel-header-row can position:sticky
           against the full page instead of a small parent box. -->
      <div class="channel-header-banner hidden" id="channelBanner">
        <!-- populated by JS -->
      </div>
      <div class="channel-header-row hidden" id="channelHeaderRow">
        <!-- populated by JS -->
      </div>
      <div class="channel-header-desc hidden" id="channelDesc">
        <!-- populated by JS -->
      </div>

      <!-- Filter / sort bar -->
      <div class="toolbar" id="toolbar">
        <select class="sort-select" id="filterSelect">
          <option value="all">All</option>
          <option value="unwatched">Unwatched</option>
          <option value="watched">Watched</option>
        </select>
        <select class="mark-all-select" id="markAllSelect">
          <option value="" selected disabled>Mark all as…</option>
          <option value="watched">Watched</option>
          <option value="unwatched">Unwatched</option>
        </select>
        <div class="toolbar-center"></div>
        <div class="toolbar-right">
          <button class="btn-feed-errors hidden" id="btnFeedErrors" title="Feed errors"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> <span id="feedErrorCount">0</span></button>
          <select class="sort-select" id="sortSelect">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
          </select>
          <select class="duration-select" id="durationSelect">
            <option value="any">Any length</option>
            <option value="short">Short (&lt;5m)</option>
            <option value="medium">Medium (5–20m)</option>
            <option value="long">Long (&gt;20m)</option>
          </select>
          <div class="layout-toggle">
            <button class="layout-btn active" data-layout="grid" title="Grid view"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg></button>
            <button class="layout-btn" data-layout="list" title="List view"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h.01"/><path d="M3 12h.01"/><path d="M3 19h.01"/><path d="M8 5h13"/><path d="M8 12h13"/><path d="M8 19h13"/></svg></button>
          </div>
        </div>
      </div>

      <!-- Video grid / list -->
      <div class="video-container" id="videoContainer">
        <!-- populated by JS -->
        <div class="load-more-wrap hidden" id="loadMoreWrap">
          <div class="spinner"></div> Loading more…
        </div>
      </div>

      <!-- Settings panel (hidden by default) -->
      <div class="settings-panel hidden" id="settingsPanel">
        <!-- populated by JS -->
      </div>

      <!-- Categories management panel -->
      <div class="settings-panel hidden" id="categoriesPanel">
        <!-- populated by JS -->
      </div>

      <!-- Watch page (dedicated video player) -->
      <div class="watch-panel hidden" id="watchPanel">
        <div class="watch-header">
          <button class="watch-back" id="watchBack"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Back</button>
        </div>
        <div class="watch-player-wrap" id="watchPlayerWrap">
          <!-- YT player injected here -->
        </div>
        <div class="watch-info">
          <h1 class="watch-title" id="watchTitle"></h1>
          <div class="watch-meta-row">
            <div class="watch-meta" id="watchMeta"></div>
            <a class="btn-watch-yt" id="watchYtLink" target="_blank" rel="noopener">View on YouTube</a>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- ── MODALS ─────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <!-- populated by JS -->
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/app.js"></script>
</body>
</html>
